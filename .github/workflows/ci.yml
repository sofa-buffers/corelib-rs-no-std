name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      # Lints the default + dev-target build for fast feedback; the `features`
      # job lints every individual feature combination (incl. the 32-bit width).
      - name: Clippy (all features, all targets)
        run: cargo clippy --all-features --all-targets -- -D warnings

  test:
    name: test (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test across the toolchains that matter for a compiler-versioned
        # language (§12.1): current stable, the upcoming beta (catches
        # regressions early), and the declared MSRV (Cargo.toml
        # `rust-version = 1.70`) so an accidental MSRV bump fails CI.
        toolchain: [stable, beta, "1.70"]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      # `--locked` enforces the committed Cargo.lock so the MSRV (1.70) job
      # tests the exact pinned dependency tree. Without it the resolver pulls
      # the newest semver-compatible versions, and serde_json's transitive deps
      # (zmij, syn, quote, …) keep bumping their own MSRV past 1.70 in patch
      # releases — silently breaking this job.
      - name: Build (all features, debug)
        run: cargo build --locked --all-features --verbose

      # The size-optimized release profile is the shipping config for this
      # crate, so it must build (and stay MSRV-clean) too (§12.1 step 4).
      - name: Build (all features, release)
        run: cargo build --locked --all-features --release --verbose

      - name: Test (all features)
        run: cargo test --locked --all-features --verbose

      - name: Test (default features)
        run: cargo test --locked --verbose

  vectors:
    name: vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      # Replay the shared conformance vectors under each feature config as its own
      # step, so the step list shows at a glance which config passed or failed —
      # all in one job, so the toolchain and cargo cache are still set up only
      # once. The suite is `requires`-aware: each config runs the vectors it can
      # represent and skips the rest. `if: ${{ !cancelled() }}` on the later steps
      # keeps every config running even after one fails (old `fail-fast: false`).
      - name: vectors — full, 64-bit
        run: cargo test --test vectors_tests --all-features --verbose

      - name: vectors — integers only, 32-bit
        if: ${{ !cancelled() }}
        run: cargo test --test vectors_tests --no-default-features --verbose

      - name: vectors — full wire, 32-bit width
        if: ${{ !cancelled() }}
        run: cargo test --test vectors_tests --no-default-features --features fixlen,array,sequence,fp64 --verbose

      - name: vectors — integers only, 64-bit
        if: ${{ !cancelled() }}
        run: cargo test --test vectors_tests --no-default-features --features value64 --verbose

      - name: vectors — scalars + floats only
        if: ${{ !cancelled() }}
        run: cargo test --test vectors_tests --no-default-features --features fixlen,fp64,value64 --verbose

      - name: vectors — no fixlen
        if: ${{ !cancelled() }}
        run: cargo test --test vectors_tests --no-default-features --features array,sequence,value64 --verbose

  features:
    name: powerset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      # Compile + lint *every* combination of feature flags (2^N configs,
      # including the 32-bit value width = no `value64`). Catches `cfg` mistakes
      # that only surface when a feature is off. `--no-dev-deps` keeps it to the
      # library (the conformance test crates need all wire types to compile).
      - name: Clippy every feature combination (library)
        run: cargo hack --feature-powerset --no-dev-deps clippy --lib -- -D warnings

      # Behavioural smoke test (encode -> decode) under every combination. The
      # config_tests crate is `cfg`-gated so it builds and runs for any subset.
      - name: Test every feature combination (config smoke tests)
        run: cargo hack --feature-powerset test --test config_tests

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to push the badge JSON to the `badges` branch
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Measure coverage
        run: |
          cargo llvm-cov --all-features --summary-only --json --output-path coverage.json
          PCT=$(jq '.data[0].totals.lines.percent' coverage.json)
          printf 'line coverage: %.1f%%\n' "$PCT"
          echo "COVERAGE_PCT=$PCT" >> "$GITHUB_ENV"

      # Publish a Shields.io endpoint badge driven by the real CI coverage
      # number. The JSON lives on an orphan `badges` branch so it never
      # clutters main; the README points Shields at its raw URL.
      - name: Publish coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          PCT_INT=$(printf '%.0f' "$COVERAGE_PCT")
          if   [ "$PCT_INT" -ge 90 ]; then COLOR=brightgreen
          elif [ "$PCT_INT" -ge 75 ]; then COLOR=green
          elif [ "$PCT_INT" -ge 60 ]; then COLOR=yellowgreen
          elif [ "$PCT_INT" -ge 40 ]; then COLOR=orange
          else COLOR=red; fi
          MSG=$(printf '%.1f%%' "$COVERAGE_PCT")
          mkdir badge-out && cd badge-out
          printf '{"schemaVersion":1,"label":"coverage","message":"%s","color":"%s"}\n' "$MSG" "$COLOR" > coverage.json
          git init -q
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -q -b badges
          git add coverage.json
          git commit -q -m "chore: update coverage badge ($MSG)"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" badges

  no_std:
    name: no_std + footprint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (bare-metal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Cortex-M0 / Cortex-M4F / RISC-V 32 — the targets measured by
          # tools/footprint.sh. llvm-tools-preview provides llvm-size and
          # rust-lld, which footprint.sh links and reads the .text size with.
          targets: thumbv7em-none-eabihf, thumbv6m-none-eabi, riscv32imc-unknown-none-elf
          components: llvm-tools-preview

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      # Building the library for a bare-metal Cortex-M target with no host std
      # proves the crate is genuinely no_std / heap-free.
      - name: Build for thumbv7em-none-eabihf (all features)
        run: cargo build --lib --all-features --target thumbv7em-none-eabihf

      # The 32-bit value width (default features minus `value64`) must also
      # compile for bare metal.
      - name: Build for thumbv7em-none-eabihf (32-bit value width)
        run: cargo build --lib --no-default-features --features fixlen,array,sequence,fp64 --target thumbv7em-none-eabihf

      # Report the library .text footprint across feature configurations for
      # Cortex-M and RISC-V, so size changes surface in the CI log (single
      # source of truth for the numbers documented in the README).
      - name: Library .text footprint (Cortex-M0)
        run: tools/footprint.sh thumbv6m-none-eabi

      - name: Library .text footprint (Cortex-M4F)
        run: tools/footprint.sh thumbv7em-none-eabihf

      - name: Library .text footprint (RISC-V 32)
        run: tools/footprint.sh riscv32imc-unknown-none-elf
