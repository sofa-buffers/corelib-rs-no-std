name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      # NB: `value32` narrows the scalar value type, so it is *not* additive and
      # is excluded from the `--all-features` set (which would otherwise compile
      # the 64-bit tests with 32-bit types). Lint the full 64-bit wire-feature
      # set here; `value32` is linted/built separately.
      - name: Clippy (all wire features, all targets)
        run: cargo clippy --features fixlen,array,sequence,fp64 --all-targets -- -D warnings

      - name: Clippy (value32, library)
        run: cargo clippy --no-default-features --features value32,fixlen,array,sequence,fp64 --lib -- -D warnings

  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Build (all wire features)
        run: cargo build --features fixlen,array,sequence,fp64 --verbose

      - name: Test (all wire features)
        run: cargo test --features fixlen,array,sequence,fp64 --verbose

      - name: Test (default features)
        run: cargo test --verbose

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to push the badge JSON to the `badges` branch
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Measure coverage
        run: |
          cargo llvm-cov --features fixlen,array,sequence,fp64 --summary-only --json --output-path coverage.json
          PCT=$(jq '.data[0].totals.lines.percent' coverage.json)
          printf 'line coverage: %.1f%%\n' "$PCT"
          echo "COVERAGE_PCT=$PCT" >> "$GITHUB_ENV"

      # Publish a Shields.io endpoint badge driven by the real CI coverage
      # number. The JSON lives on an orphan `badges` branch so it never
      # clutters main; the README points Shields at its raw URL.
      - name: Publish coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          PCT_INT=$(printf '%.0f' "$COVERAGE_PCT")
          if   [ "$PCT_INT" -ge 90 ]; then COLOR=brightgreen
          elif [ "$PCT_INT" -ge 75 ]; then COLOR=green
          elif [ "$PCT_INT" -ge 60 ]; then COLOR=yellowgreen
          elif [ "$PCT_INT" -ge 40 ]; then COLOR=orange
          else COLOR=red; fi
          MSG=$(printf '%.1f%%' "$COVERAGE_PCT")
          mkdir badge-out && cd badge-out
          printf '{"schemaVersion":1,"label":"coverage","message":"%s","color":"%s"}\n' "$MSG" "$COLOR" > coverage.json
          git init -q
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -q -b badges
          git add coverage.json
          git commit -q -m "chore: update coverage badge ($MSG)"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" badges

  no_std:
    name: no_std bare-metal build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (thumbv7em target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      # Building the library for a bare-metal Cortex-M target with no host std
      # proves the crate is genuinely no_std / heap-free.
      - name: Build for thumbv7em-none-eabihf (all wire features)
        run: cargo build --lib --features fixlen,array,sequence,fp64 --target thumbv7em-none-eabihf

      # The 32-bit value ABI must also compile for bare metal.
      - name: Build for thumbv7em-none-eabihf (value32)
        run: cargo build --lib --no-default-features --features value32,fixlen,array,sequence,fp64 --target thumbv7em-none-eabihf
