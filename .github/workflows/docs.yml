name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the scopes the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deploy at a time; don't cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      # Document only this crate (not its deps); fail on broken intra-doc links.
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps

      # rustdoc emits target/doc/<crate>/index.html; add a root redirect so the
      # Pages site lands on the crate docs instead of a bare directory listing.
      - name: Add index redirect
        run: echo '<meta http-equiv="refresh" content="0; url=sofab/index.html">' > target/doc/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
